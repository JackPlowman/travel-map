name: "Setup Test Dependencies"
description: "Installs test dependencies for the project"

inputs:
  setup-browsers:
    description: "Whether to set up browsers for Playwright"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Set up Just
      uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3.1.0
    - name: Install Python and UV
      uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
      with:
        working-directory: tests
    - name: Install Playwright Dependencies
      if: ${{ inputs.setup-browsers == 'true' }}
      shell: bash
      run: just tests::playwright-install
    - name: Install Python Dependencies
      shell: bash
      run: just tests::install
